# AI Gateway 配置文件

server:
  host: "0.0.0.0"
  port: 8080
  mode: "debug"  # debug, release

# SQLite 配置
database:
  driver: "sqlite3"
  path: "./ai_gateway.db"  # 数据库文件路径

# 大模型配置
models:
  openai:
    enabled: false
    base_url: "https://api.openai.com/v1"
    api_key: "${OPENAI_API_KEY}"
    timeout: 120

  anthropic:
    enabled: false
    base_url: "https://api.anthropic.com"
    api_key: "${ANTHROPIC_API_KEY}"
    timeout: 120

  minimax:
    enabled: true
    base_url: "https://api.minimaxi.com/v1"
    api_key: "${MINIMAX_API_KEY}"  # 从环境变量 MINIMAX_API_KEY 读取
    timeout: 120

# 计费配置 (单位: $ / 1K tokens)
pricing:
  gpt-4:
    prompt: 0.03
    completion: 0.06
  gpt-4o:
    prompt: 0.0025
    completion: 0.01
  gpt-3.5-turbo:
    prompt: 0.0015
    completion: 0.002
  claude-3-opus:
    prompt: 0.015
    completion: 0.075
  claude-3-sonnet:
    prompt: 0.003
    completion: 0.015
  # MiniMax 模型
  MiniMax-M2.5:
    prompt: 0.01
    completion: 0.01
  MiniMax-Image-01:
    prompt: 0.05
    completion: 0.02

# 限流配置
rate_limit:
  enabled: true
  requests_per_minute: 60
  tokens_per_minute: 100000
