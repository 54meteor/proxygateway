<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Keys - AI Gateway</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse show" style="background:#343a40;min-height:100vh">
                <div class="position-sticky pt-3">
                    <h4 class="text-white px-3 mb-3"><i class="bi bi-gateway"></i> AI Gateway</h4>
                    <ul class="nav flex-column">
                        <li class="nav-item"><a href="/admin/" class="nav-link" style="color:#adb5bd"><i class="bi bi-speedometer2 me-2"></i>仪表盘</a></li>
                        <li class="nav-item"><a href="/admin/users" class="nav-link" style="color:#adb5bd"><i class="bi bi-people me-2"></i>用户管理</a></li>
                        <li class="nav-item"><a href="/admin/keys" class="nav-link active" style="background:#495057;color:#fff"><i class="bi bi-key me-2"></i>API Keys</a></li>
                        <li class="nav-item"><a href="/admin/usage" class="nav-link" style="color:#adb5bd"><i class="bi bi-bar-chart me-2"></i>用量统计</a></li>
                        <li class="nav-item"><a href="/" class="nav-link" style="color:#adb5bd"><i class="bi bi-arrow-left me-2"></i>返回首页</a></li>
                    </ul>
                </div>
            </nav>
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <h2 class="mb-4">API Keys 管理</h2>
                
                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>用户</th>
                                    <th>名称</th>
                                    <th>Key Hash</th>
                                    <th>状态</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {{range .Keys}}
                                <tr>
                                    <td><code class="small">{{.ID}}</code></td>
                                    <td>{{.UserID}}</td>
                                    <td>{{.Name}}</td>
                                    <td><code class="small">{{.KeyHash}}</code></td>
                                    <td><span class="badge bg-{{if eq .IsActive "1"}}success{{else}}danger{{end}}">{{if eq .IsActive "1"}}活跃{{else}}禁用{{end}}</span></td>
                                    <td>{{.CreatedAt}}</td>
                                    <td>
                                        {{if eq .IsActive "1"}}
                                        <button class="btn btn-sm btn-warning" onclick="toggleKey('{{.ID}}', false)">禁用</button>
                                        {{else}}
                                        <button class="btn btn-sm btn-success" onclick="toggleKey('{{.ID}}', true)">启用</button>
                                        {{end}}
                                        <button class="btn btn-sm btn-danger" onclick="deleteKey('{{.ID}}')">删除</button>
                                    </td>
                                </tr>
                                {{else}}
                                <tr><td colspan="7" class="text-center text-muted">暂无 Keys</td></tr>
                                {{end}}
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleKey(id, active) {
            fetch('/admin/api/key/toggle', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({key_id: id, active: active})
            }).then(r => r.json()).then(d => location.reload());
        }
        
        function deleteKey(id) {
            if(confirm('确定删除该 API Key?')) {
                fetch('/admin/api/key/delete', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({key_id: id})
                }).then(r => r.json()).then(d => location.reload());
            }
        }
    </script>
</body>
</html>
