<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - AI Gateway</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.8.1/font/bootstrap-icons.css">
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar collapse show" style="background:#343a40;min-height:100vh">
                <div class="position-sticky pt-3">
                    <h4 class="text-white px-3 mb-3"><i class="bi bi-gateway"></i> AI Gateway</h4>
                    <ul class="nav flex-column">
                        <li class="nav-item"><a href="/admin/" class="nav-link" style="color:#adb5bd"><i class="bi bi-speedometer2 me-2"></i>仪表盘</a></li>
                        <li class="nav-item"><a href="/admin/users" class="nav-link active" style="background:#495057;color:#fff"><i class="bi bi-people me-2"></i>用户管理</a></li>
                        <li class="nav-item"><a href="/admin/keys" class="nav-link" style="color:#adb5bd"><i class="bi bi-key me-2"></i>API Keys</a></li>
                        <li class="nav-item"><a href="/admin/usage" class="nav-link" style="color:#adb5bd"><i class="bi bi-bar-chart me-2"></i>用量统计</a></li>
                        <li class="nav-item"><a href="/" class="nav-link" style="color:#adb5bd"><i class="bi bi-arrow-left me-2"></i>返回首页</a></li>
                    </ul>
                </div>
            </nav>
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
                <h2 class="mb-4">用户管理</h2>
                
                <div class="card">
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>邮箱</th>
                                    <th>余额</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {{range .Users}}
                                <tr>
                                    <td><code class="small">{{.ID}}</code></td>
                                    <td>{{.Email}}</td>
                                    <td><span class="badge bg-{{if gt .Balance 0}}success{{else}}danger{{end}}">${{.Balance}}</span></td>
                                    <td>{{.CreatedAt}}</td>
                                    <td>
                                        <button class="btn btn-sm btn-primary" onclick="showRecharge('{{.ID}}', '{{.Email}}', {{.Balance}})">充值</button>
                                        <button class="btn btn-sm btn-danger" onclick="resetBalance('{{.ID}}')">重置</button>
                                    </td>
                                </tr>
                                {{else}}
                                <tr><td colspan="5" class="text-center text-muted">暂无用户</td></tr>
                                {{end}}
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- 充值模态框 -->
    <div class="modal fade" id="rechargeModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">充值</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p>用户: <strong id="rechargeUser"></strong></p>
                    <p>当前余额: <strong id="rechargeBalance"></strong></p>
                    <div class="mb-3">
                        <label class="form-label">充值金额</label>
                        <input type="number" class="form-control" id="rechargeAmount" value="100" min="0" step="0.01">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="doRecharge()">确认充值</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentUserId = '';
        
        function showRecharge(id, email, balance) {
            currentUserId = id;
            document.getElementById('rechargeUser').textContent = email;
            document.getElementById('rechargeBalance').textContent = '$' + balance;
            new bootstrap.Modal(document.getElementById('rechargeModal')).show();
        }
        
        function doRecharge() {
            const amount = parseFloat(document.getElementById('rechargeAmount').value);
            fetch('/admin/api/user/recharge', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: currentUserId, amount: amount})
            }).then(r => r.json()).then(d => {
                if(d.error) alert(d.error);
                else location.reload();
            });
        }
        
        function resetBalance(id) {
            if(confirm('确定重置该用户余额为0?')) {
                fetch('/admin/api/user/reset', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({user_id: id})
                }).then(r => r.json()).then(d => {
                    if(d.error) alert(d.error);
                    else location.reload();
                });
            }
        }
    </script>
</body>
</html>
